name: backfill-invite-on-label

on:
  workflow_dispatch:

jobs:
  process-existing-issues:
    runs-on: ubuntu-latest

    steps:
      - name: Process open issues with label
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelToCheck = "github-invitation";

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner,
                repo,
                state: "open",
                per_page: 100
              }
            );

            for (const issue of issues) {
              const hasLabel = issue.labels.some(l => l.name === labelToCheck);

              if (!hasLabel) continue;

              console.log(`Processing issue #${issue.number}`);

              // Trigger the same effect as your action (re-run invite logic)
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: `Triggering invite workflow manually for recovery`
              });

              // OPTIONAL: re-emit label event by removing & re-adding
              await github.rest.issues.removeLabel({
                owner,
                repo,
                issue_number: issue.number,
                name: labelToCheck
              });

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: issue.number,
                labels: [labelToCheck]
              });
            }

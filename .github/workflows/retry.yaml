name: retry-old-failures

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours
  workflow_dispatch:       # allow manual trigger

defaults:
  run:
    shell: pwsh

jobs:
  retry:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read

    steps:
      - name: Retry failed workflows
        run: |
          $repo = "${{ github.repository }}"

          # Get failed runs (limit can be increased)
          $runs = gh run list `
            --repo $repo `
            --status failure `
            --limit 100 `
            --json databaseId,createdAt,workflowName `
            | ConvertFrom-Json

          $now = Get-Date

          foreach ($run in $runs) {
            $created = Get-Date $run.createdAt

            # Optional: only retry runs older than 1 day
            if (($now - $created).TotalDays -gt 1) {
              Write-Host "Retrying run $($run.databaseId) ($($run.workflowName)) created $created"

              gh run rerun $run.databaseId `
                --repo $repo `
                --failed
            }
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
``

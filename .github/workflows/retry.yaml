- name: Retrigger labels using PAT
  run: |
    repo="${{ github.repository }}"

    gh issue list --repo $repo --label "github-invitation" --state open --limit 200 \
    --json number -q '.[].number' | while read num; do

      echo "Re-triggering issue #$num"

      # Remove label
      gh api \
        -X DELETE \
        repos/$repo/issues/$num/labels/github-invitation

      sleep 1

      # ✅ FIXED: Add label correctly
      gh api \
        -X POST \
        repos/$repo/issues/$num/labels \
        -f "labels[]=github-invitation"

      sleep 2
    done
  env:
    GH_TOKEN: ${{ secrets.INVITE_TOKEN }}
